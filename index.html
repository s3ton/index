<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conio • Crypto Analytics</title>
  <meta name="description" content="Real-time crypto market analytics dashboard with live data."/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    
    /* Conio-style clean white cards with soft shadows */
    .chart-card { 
      background: #ffffff; 
      border-radius: 24px; 
      overflow: visible; 
      border: 1px solid #f1f5f9; 
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); 
      display: grid;
    }
    
    .chart-container { min-height: 500px; position: relative; padding: 1.5rem; }
    .chart-wrapper { position: relative; width: 100%; height: 100%; }
    
    @media (max-width: 1023px) { .chart-container { min-height: 550px; padding: 1rem; } }
    @media (max-width: 640px) { .chart-container { min-height: 500px; } }
    
    .plotly .hovertext { z-index: 1000; }
    .hovertext { max-height: 280px; overflow-y: auto; }
    .hovertext::-webkit-scrollbar { width: 6px; }
    .hovertext::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
    .hovertext::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    
    /* Tab Styling */
    .tab-container { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; }
    .tab-btn { 
      padding: 1rem 1.5rem; 
      font-size: 1rem; 
      font-weight: 600; 
      color: #64748b; 
      border: none; 
      background: none; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      border-bottom: 3px solid transparent; 
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: #0050ff; }
    .tab-btn.active { color: #0050ff; border-bottom-color: #0050ff; }
    .tab-content { display: none; }
    .tab-content.active { display: grid; }
  </style>
</head>
<body class="bg-[#f8f9fb] text-slate-800 min-h-screen">

<nav class="border-b border-gray-200 bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm">
  <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#0050ff] rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md">
        C
      </div>
      <span class="title-font text-2xl font-bold tracking-tight text-[#0a1b39]">Conio <span class="text-[#0050ff]">Analytics</span></span>
    </div>
    <div class="flex items-center gap-4 sm:gap-6">

    </div>
  </div>
</nav>

<div class="max-w-screen-2xl mx-auto px-6 py-12">


  <div class="mb-20">
    <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
      <div>
        <h2 class="title-font text-3xl font-bold tracking-tight text-[#0a1b39]">Conio Market Cap Index</h2>
        <p class="text-slate-500 mt-2 font-medium">Dynamic cryptocurrency portfolio • Market-cap weighted allocation</p>
      </div>
    </div>

    <div class="tab-container">
      <button class="tab-btn active" data-tab="performance">Market Cap Index Performance</button>
      <button class="tab-btn" data-tab="composition">Portfolio Composition</button>
    </div>

    <div class="mb-10">
      <div id="performance" class="tab-content active">
        <div class="chart-card w-full lg:w-3/4 mx-auto">
          <div class="chart-container">
            <div class="chart-wrapper" id="performance-chart"></div>
          </div>
        </div>
      </div>
      <div id="composition" class="tab-content">
        <div class="chart-card w-full lg:w-3/4 mx-auto">
          <div class="chart-container">
            <div class="chart-wrapper" id="composition-chart"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="mb-16">
    <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
      <div>
        <h2 class="title-font text-3xl font-bold tracking-tight text-[#0a1b39]">Price History Analytics</h2>
        <p class="text-slate-500 mt-2 font-medium">Interactive long-term charts • Public Google Sheets data</p>
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-10">
      <div class="chart-card">
        <div class="chart-container p-0 overflow-hidden rounded-3xl">
          <div class="chart-wrapper">
            <iframe loading="lazy" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCt8OSoZsjkgiE21iwp7Y_RhhJTO19c3n5oFxVmHzp1vS_7w5qMngjNb1EGmJp5LZVlu6JGf366JMo/pubchart?oid=2136874869&format=interactive" width="100%" height="100%" frameborder="0" allowfullscreen style="border: none; display: block;"></iframe>
          </div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-container p-0 overflow-hidden rounded-3xl">
          <div class="chart-wrapper">
            <iframe loading="lazy" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCt8OSoZsjkgiE21iwp7Y_RhhJTO19c3n5oFxVmHzp1vS_7w5qMngjNb1EGmJp5LZVlu6JGf366JMo/pubchart?oid=1143695036&format=interactive" width="100%" height="100%" frameborder="0" allowfullscreen style="border: none; display: block;"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center text-slate-500 text-sm py-12 border-t border-gray-200 mt-12">
  </footer>
</div>

<script>
  (function() {
    // ----- DOM Elements -----
    const performanceChartEl = document.getElementById('performance-chart');
    const compositionChartEl = document.getElementById('composition-chart');

    // ----- Load Strategy Charts from JSON -----
    async function loadStrategyCharts() {
      try {
        const perfResponse = await fetch('./code/strategy_performance.json');
        if (perfResponse.ok) {
          const perfData = await perfResponse.json();
          if (performanceChartEl && perfData.data && perfData.layout) {
            perfData.data[0].hovertemplate = 'Indice: %{y:$,.0f}<extra></extra>';
            if (perfData.data.length > 1) {
              perfData.data[1].hovertemplate = 'Benchmark: %{y:$,.0f}<extra></extra>';
            }
            perfData.layout.yaxis = perfData.layout.yaxis || {};
            perfData.layout.yaxis.tickformat = '$,.0f';

            const layoutWithMargins = {
              ...perfData.layout,
              margin: { l: 60, r: 40, t: 50, b: 40 },
              plot_bgcolor: "transparent",
              paper_bgcolor: "transparent",
              font: { color: '#475569' },
              hoverlabel: {
                bgcolor: "#ffffff",
                bordercolor: "#e2e8f0",
                font: { size: 12, color: "#0f172a" }
              }
            };
            Plotly.newPlot(performanceChartEl, perfData.data, layoutWithMargins, { responsive: true, displayModeBar: true });
          }
        }
      } catch (e) { console.error('Performance chart error:', e.message); }

      try {
        const compResponse = await fetch('./code/strategy_composition.json');
        if (compResponse.ok) {
          const compData = await compResponse.json();
          if (compositionChartEl && compData.data && compData.layout) {
            const layoutWithMargins = {
              ...compData.layout,
              margin: { l: 60, r: 40, t: 50, b: 40 },
              plot_bgcolor: "transparent",
              paper_bgcolor: "transparent",
              font: { color: '#475569' },
              hoverlabel: {
                bgcolor: "#ffffff",
                bordercolor: "#e2e8f0",
                font: { size: 12, color: "#0f172a" }
              }
            };
            compData.data.forEach(trace => {
              if (trace.name) {
                trace.hovertemplate = `<b>%{fullData.name}</b>: %{y:.0%}<extra></extra>`;
              }
            });
            Plotly.newPlot(compositionChartEl, compData.data, layoutWithMargins, { responsive: true, displayModeBar: true });

            const wheelHandler = (event) => {
              const hovertexts = document.querySelectorAll('.hovertext');
              const hovertext = Array.from(hovertexts).find(ht => ht.clientHeight > 0);
              if (hovertext && hovertext.scrollHeight > hovertext.clientHeight) {
                event.preventDefault();
                hovertext.scrollTop += event.deltaY;
              }
            };
            compositionChartEl.on('plotly_hover', () => compositionChartEl.addEventListener('wheel', wheelHandler, { passive: false }));
            compositionChartEl.on('plotly_unhover', () => compositionChartEl.removeEventListener('wheel', wheelHandler));
          }
        }
      } catch (e) { console.error('Composition chart error:', e.message); }
    }

    loadStrategyCharts();



    // ----- Tab Switching Functionality -----
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const tabName = this.getAttribute('data-tab');
        
        // Remove active class from all buttons and contents
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        // Add active class to clicked button and corresponding content
        this.classList.add('active');
        const tabContent = document.getElementById(tabName);
        if (tabContent) {
          tabContent.classList.add('active');
          // Trigger Plotly resize to ensure chart renders properly
          setTimeout(() => {
            if (tabName === 'performance' && performanceChartEl) Plotly.Plots.resize(performanceChartEl);
            if (tabName === 'composition' && compositionChartEl) Plotly.Plots.resize(compositionChartEl);
          }, 0);
        }
      });
    });
  })();
</script>
</body>
</html>
