<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Conio • Crypto Analytics</title>
<meta name="description" content="Real-time crypto market analytics dashboard with live data."/>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

</head>
<body class="min-h-screen pt-[73px]">
<nav class="border-b border-gray-200 bg-white/90 backdrop-blur-md fixed top-0 left-0 w-full z-50 shadow-sm h-[73px] flex items-center">
<div class="w-full px-4 md:px-6 flex items-center justify-between">
<div class="flex items-center gap-4">
<button id="mobile-menu-btn" class="md:hidden text-slate-500 hover:text-[#0050ff] focus:outline-none text-2xl transition-colors">
<i class="fa-solid fa-bars"></i>
</button>
<div class="flex items-center gap-3">
<img src="https://media.licdn.com/dms/image/v2/D4D0BAQF68-WEFB0KLg/company-logo_200_200/company-logo_200_200/0/1697810707337/conio_logo?e=2147483647&v=beta&t=al0vx5YOQv08DXnuzKaUvTg4FmCbTU8JpmEjziVADHE" alt="Conio Logo" class="w-10 h-10 rounded-full shadow-md object-cover">
<span class="title-font text-xl md:text-2xl font-bold tracking-tight text-[#0a1b39] truncate">Conio <span class="text-[#0050ff]">Analytics</span></span>
</div>
</div>
</div>
</nav>

<div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity md:hidden"></div>

<aside id="sidebar" class="fixed top-0 md:top-[73px] left-0 w-72 md:w-64 h-full md:h-[calc(100vh-73px)] bg-white border-r border-slate-200 z-[60] md:z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out overflow-y-auto shadow-2xl md:shadow-none">
<div class="p-6 md:p-4 flex flex-col gap-2 h-full">
<div class="flex items-center justify-between mb-6 md:hidden">
<div class="flex items-center gap-3">
<img src="https://media.licdn.com/dms/image/v2/D4D0BAQF68-WEFB0KLg/company-logo_200_200/company-logo_200_200/0/1697810707337/conio_logo?e=2147483647&v=beta&t=al0vx5YOQv08DXnuzKaUvTg4FmCbTU8JpmEjziVADHE" alt="Conio Logo" class="w-8 h-8 rounded-full shadow-sm object-cover">
<span class="title-font text-lg font-bold text-[#0a1b39]">Conio <span class="text-[#0050ff]">Analytics</span></span>
</div>
<button id="close-sidebar-btn" class="text-slate-400 hover:text-red-500 transition-colors p-2">
<i class="fa-solid fa-xmark text-2xl"></i>
</button>
</div>
<button class="sidebar-btn active w-full text-left px-4 py-3 rounded-xl font-semibold flex items-center gap-3 transition-colors text-[#0050ff] bg-blue-50" data-page="page-settori">
<i class="fa-solid fa-chart-pie w-5 text-center"></i> Indici Crypto
</button>
<button class="sidebar-btn w-full text-left px-4 py-3 rounded-xl font-semibold flex items-center gap-3 transition-colors text-slate-600 hover:bg-slate-50" data-page="page-market">
<i class="fa-solid fa-chart-line w-5 text-center"></i> Market Analytics
</button>
<button class="sidebar-btn w-full text-left px-4 py-3 rounded-xl font-semibold flex items-center gap-3 transition-colors text-slate-600 hover:bg-slate-50" data-page="page-builder">
<i class="fa-solid fa-sliders w-5 text-center"></i> Strategy Builder
</button>
</div>
</aside>

<main class="md:ml-64 p-2 md:p-6 lg:p-8 transition-all duration-300 md:overflow-visible min-h-screen">
  <div id="page-settori" class="page-content block"></div>
  <div id="page-market" class="page-content hidden"></div>
  <div id="page-builder" class="page-content hidden"></div>
</main>

<footer class="md:ml-64 text-left px-4 md:px-6 lg:px-8 text-slate-500 text-sm py-8 md:py-12 border-t border-gray-200 mt-12">
&copy; 2026 Conio Analytics
</footer>

<!-- ASSET MODAL -->
<div id="asset-modal" class="modal-backdrop">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-[#0a1b39] flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-[#0050ff]"></i>
                Aggiungi Asset
            </h3>
            <button onclick="closeAddAssetModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="setup-label mb-1.5 block">Seleziona Asset</label>
                <select id="modal-strat-asset" class="setup-input w-full">
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="SOL">Solana (SOL)</option>
                    <option value="XRP">XRP (XRP)</option>
                    <option value="ADA">Cardano (ADA)</option>
                    <option value="DOT">Polkadot (DOT)</option>
                    <option value="AVAX">Avalanche (AVAX)</option>
                    <option value="LINK">Chainlink (LINK)</option>
                    <option value="DOGE">Dogecoin (DOGE)</option>
                    <option value="INJ">Injective (INJ)</option>
                    <option value="NEAR">Near (NEAR)</option>
                    <option value="LTC">Litecoin (LTC)</option>
                    <option value="ONDO">Ondo (ONDO)</option>
                    <option value="OP">Optimism (OP)</option>
                    <option value="POL">Polygon (POL)</option>
                    <option value="SKY">Sky (SKY)</option>
                    <option value="STX">Stacks (STX)</option>
                    <option value="SUI">Sui (SUI)</option>
                    <option value="TIA">Celestia (TIA)</option>
                    <option value="UNI">Uniswap (UNI)</option>
                    <option value="XLM">Stellar (XLM)</option>
                    <option value="XPL">Plasma (XPL)</option>
                    <option value="AAVE">Aave (AAVE)</option>
                    <option value="ALGO">Algorand (ALGO)</option>
                    <option value="APT">Aptos (APT)</option>
                    <option value="ARB">Arbitrum (ARB)</option>
                    <option value="ATOM">Cosmos (ATOM)</option>
                    <option value="ETC">Ethereum Classic (ETC)</option>
                    <option value="FIL">Filecoin (FIL)</option>
                    <option value="GRT">The Graph (GRT)</option>
                    <option value="HBAR">Hedera (HBAR)</option>
                    <option value="NIGHT">Night (NIGHT)</option>
                </select>
            </div>
            
            <div>
                <label class="setup-label mb-1.5 block">Peso Percentuale (%)</label>
                <div class="relative">
                    <input type="number" id="modal-strat-weight" placeholder="es. 25" min="1" max="100" class="setup-input w-full pr-10">
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">%</span>
                </div>
            </div>

            <div class="pt-4 flex gap-3">
                <button onclick="closeAddAssetModal()" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                    Annulla
                </button>
                <button id="modal-confirm-btn" class="flex-1 px-4 py-3 bg-[#0050ff] text-white rounded-xl font-bold hover:bg-blue-700 transition-transform active:scale-95">
                    Conferma
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
